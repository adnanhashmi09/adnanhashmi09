name: Update Anton

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update Anton
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USER: adnanhashmi09
        run: python scripts/update_anton.py

      - name: Commit changes
        run: |
          git config user.name "anton-bot"
          git config user.email "anton-bot@users.noreply.github.com"
          git add anton.svg README.md
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "feed Anton 🐹"
            git push
          fi
